# Kit-repo CI (ADO primary) — integrity + regression gate for agent-base itself.
# Mirrored by .github/workflows/ci.yml. Keep the two in lockstep.
#
# Gates:
#   1. npm test            — unit suite (audit, materialize, extract, gates).
#   2. rule-check-map      — every mechanical rule maps to a check (R-51).
#   3. docs-consistency    — no v1 vocabulary drift, no broken doc links.
#   4. audit --root . --strict — the kit repo itself stays audit-clean.
#   5. build-starter + audit --strict — the published starter stays audit-clean.
# The starter is published as a pipeline artifact ("starter").
trigger:
  branches:
    include: ['*']
# NOTE: Azure Repos Git ignores YAML `pr:` triggers — PR validation requires a
# branch build-validation policy pointing at this pipeline (the block below is
# honored only when this YAML runs against a GitHub-hosted repo).
pr:
  branches:
    include: ['*']
pool:
  vmImage: ubuntu-latest
steps:
  - checkout: self
    fetchDepth: 1
  - task: NodeTool@0
    inputs:
      versionSpec: '22.x'
    displayName: Use Node 22
  - bash: npm test
    displayName: Unit tests
  - bash: node scripts/rule-check-map.mjs
    displayName: rule↔check integrity (R-51)
  - bash: node scripts/docs-consistency.mjs
    displayName: docs consistency
  - bash: node scripts/audit.mjs --root . --strict
    displayName: kit self-audit --strict
  - bash: |
      set -euo pipefail
      OUT="$(Agent.TempDirectory)/starter"
      node scripts/build-starter.mjs "$OUT" --git
      node scripts/audit.mjs --root "$OUT" --strict
    displayName: build starter + audit --strict
  - publish: $(Agent.TempDirectory)/starter
    artifact: starter
    displayName: Publish starter artifact
