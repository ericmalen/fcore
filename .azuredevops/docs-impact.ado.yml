# docs-impact — code changes must update docs or declare why not (visibly).
# Agent Base's own live copy (self-installed; source template: templates/ci/docs-impact.ado.yml).
# Declaration surface on ADO: a commit message line in the PR:
#   Docs: not-needed — <reason>
# Add as a PR build validation policy on the target branch.
trigger: none
pr:
  branches:
    include: ['*']
pool:
  vmImage: ubuntu-latest
steps:
  - checkout: self
    fetchDepth: 0
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
  - bash: |
      TARGET="$(System.PullRequest.TargetBranch)"
      TARGET="${TARGET#refs/heads/}"
      git fetch origin "$TARGET" --quiet
      node .claude/skills/docs/scripts/docs-impact.mjs --base "origin/$TARGET"
    displayName: docs-impact check
