# Agent Base repo CI (GitHub Actions mirror of azure-pipelines.yml).
# ADO is the primary pipeline; this mirror keeps GitHub clones honest.
# Gates: unit tests, rule↔check integrity (R-51), docs consistency,
# Agent Base self-audit --strict, and build-starter → audit --strict (starter must stay clean).
name: ci
on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']
permissions:
  contents: read
jobs:
  # Release tag gate — a vX.Y.Z tag must match package.json before consumers
  # can pin it (see docs/how-to/release-baseline.md). The full ci job below
  # also runs on the tag, so the released starter is audit-clean too.
  tag-gate:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Tag matches package.json version
        run: |
          set -euo pipefail
          VER="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "v${VER}" ]; then
            echo "::error title=Release tag mismatch::tag ${GITHUB_REF_NAME} does not match package.json v${VER}"
            exit 1
          fi
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Unit tests
        run: npm test
      - name: rule↔check integrity (R-51)
        run: node scripts/rule-check-map.mjs
      - name: docs consistency
        run: node scripts/docs-consistency.mjs
      - name: Agent Base self-audit --strict
        run: node scripts/audit.mjs --root . --strict
      - name: build starter + audit --strict
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/starter"
          node scripts/build-starter.mjs "$OUT" --git
          node scripts/audit.mjs --root "$OUT" --strict
      - name: Publish starter artifact
        uses: actions/upload-artifact@v4
        with:
          name: starter
          path: ${{ runner.temp }}/starter
