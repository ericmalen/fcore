# audit-strict — set-up projects must stay conformant to the FleetCore standard layout.
# Azure DevOps variant. Resolves FleetCore via npx at marker.pin before running
# audit --strict; a failed resolution fails the build — never fall back to an
# unpinned ref.
trigger:
  branches:
    include: ['*']
pr:
  branches:
    include: ['*']
pool:
  vmImage: ubuntu-latest
steps:
  - checkout: self
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
  - bash: |
      set -euo pipefail
      test -f .claude/fcore.json
      NPX_SPEC="$(node -e 'const m=require("./.claude/fcore.json");const pin=m.pin||("v"+m.standard);const url=String(m.toolRepo).trim().replace(/\/+$/,"");const gh=url.match(/^(?:git\+)?https:\/\/github\.com\/([^\/]+)\/([^\/]+?)(?:\.git)?$/);process.stdout.write((gh?"github:"+gh[1]+"/"+gh[2]:url.startsWith("git+")?url:url.startsWith("git@")?"git+ssh://"+url.replace(":","/"):"git+"+url)+"#"+pin)')"
      # Private FleetCore repo? npm fetches git deps through git — route credentials from a secret variable, e.g.:
      # git config --global url."https://x-token:${FCORE_TOKEN}@dev.azure.com/".insteadOf "https://dev.azure.com/"
      npx --yes "$NPX_SPEC" audit --root . --strict || {
        echo "##vso[task.logissue type=error]Audit findings, or $NPX_SPEC could not be resolved — check the tag exists and the agent can reach the repo; never fall back to an unpinned ref."
        exit 1
      }
    displayName: Resolve FleetCore npx spec and audit (--strict)
