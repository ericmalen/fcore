# audit-strict — set-up projects must stay conformant to the Agent Base standard layout.
# Installed by setup for repos with GitHub CI (alongside docs-impact).
# Runs the kit audit at the pinned release (--strict).
#
# Shallow-clones toolRepo at marker.pin (fallback: v{standard}). Private kit?
# Use secrets.KIT_TOKEN — see commented line below.
name: audit-strict
on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']
permissions:
  contents: read
jobs:
  audit-strict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Clone Agent Base at pin and audit (--strict)
        run: |
          set -euo pipefail
          MARKER=.claude/agent-base.json
          KIT_URL="$(node -e "process.stdout.write(require('./$MARKER').toolRepo)")"
          PIN="$(node -e "const m=require('./$MARKER'); process.stdout.write(m.pin||('v'+m.standard))")"
          # Private kit? prepend credentials, e.g.:
          # KIT_URL="$(echo "$KIT_URL" | sed "s#https://#https://x-token:${{ secrets.KIT_TOKEN }}@#")"
          git clone --depth 1 --branch "$PIN" "$KIT_URL" "${RUNNER_TEMP}/agent-base" || {
            echo "::error title=Agent Base pin clone failed::Could not clone $KIT_URL at tag $PIN. Check the tag exists and the runner can reach the repo."
            exit 1
          }
          node "${RUNNER_TEMP}/agent-base/scripts/audit.mjs" --root . --strict
