# orchestrator-run — scheduled headless execution of the generated
# feature-orchestrator against tasks.md (DD-15). Azure DevOps variant,
# structurally paired step-for-step with orchestrator-run.github.yml.
#
# Safety rules (do not weaken):
#   - The guard (headless-guard) skips when the Backlog is empty, when
#     only blocked/triage tasks remain, or while a previous orch/ PR is open.
#   - The orchestrator runs exactly ONE task per run, commits on a work
#     branch, and never pushes — the pipeline pushes and opens the PR.
#   - Never auto-merge / auto-complete: the PR is reviewed and merged by a
#     person.
#   - Audit trail: git history + docs/orchestration/handoff-log.jsonl +
#     this pipeline's logs. No custom server, ever.
#
# Setup:
#   - Requires completed orchestration generation (generation-manifest.json)
#     and a seeded tasks.md.
#   - Secret pipeline variable ANTHROPIC_API_KEY (required).
#   - The build service identity needs "Contribute" and "Create pull request"
#     on the repo (Project Settings → Repositories → Security).
#   - Optional: docs/orchestration/tracker-sync.json plus a secret variable
#     AZURE_DEVOPS_PAT to chain a tracker sync before the run.
#   - Private Agent Base repo? Route git credentials via a secret variable —
#     see the commented line below.
# NOTE: there is no exact ADO equivalent of GitHub's concurrency group —
# overlapping manual + scheduled runs are still serialized by the guard's
# open-PR check (branch names include the build id, so collisions are
# impossible).
trigger: none
schedules:
  - cron: '0 5 * * 1-5' # weekdays 05:00 UTC
    displayName: scheduled orchestrator run
    branches:
      include: [main]
    always: true
pool:
  vmImage: ubuntu-latest
steps:
  - checkout: self
    persistCredentials: true
    fetchDepth: 0
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
  - bash: |
      set -euo pipefail
      test -f .claude/agent-base.json
      NPX_SPEC="$(node -e 'const m=require("./.claude/agent-base.json");const pin=m.pin||("v"+m.standard);const url=String(m.toolRepo).trim().replace(/\/+$/,"");const gh=url.match(/^(?:git\+)?https:\/\/github\.com\/([^\/]+)\/([^\/]+?)(?:\.git)?$/);process.stdout.write((gh?"github:"+gh[1]+"/"+gh[2]:url.startsWith("git+")?url:url.startsWith("git@")?"git+ssh://"+url.replace(":","/"):"git+"+url)+"#"+pin)')"
      echo "##vso[task.setvariable variable=npxSpec]$NPX_SPEC"
      # Private Agent Base repo? npm fetches git deps through git — route credentials from a secret variable, e.g.:
      # git config --global url."https://x-token:${AGENT_BASE_TOKEN}@dev.azure.com/".insteadOf "https://dev.azure.com/"
      npx --yes "$NPX_SPEC" --version || {
        echo "##vso[task.logissue type=error]Could not resolve $NPX_SPEC — do not fall back to an unpinned ref."
        exit 1
      }
    displayName: Resolve Agent Base npx spec
  - bash: |
      set -euo pipefail
      curl -sf -u ":$SYSTEM_ACCESSTOKEN" \
        "$(System.CollectionUri)$(System.TeamProject)/_apis/git/repositories/$(Build.Repository.ID)/pullrequests?searchCriteria.status=active&api-version=7.1" \
        | node -e '
          let raw = "";
          process.stdin.on("data", (c) => { raw += c; }).on("end", () => {
            const prs = JSON.parse(raw).value ?? [];
            const branches = prs.map((p) => p.sourceRefName.replace("refs/heads/", ""));
            require("fs").writeFileSync(process.env.AGENT_TEMPDIRECTORY + "/open-branches.json", JSON.stringify(branches));
          });
        '
      GUARD_OUT="$(npx --yes "$NPX_SPEC" headless-guard --open-branches "$AGENT_TEMPDIRECTORY/open-branches.json")"
      echo "$GUARD_OUT"
      echo "##vso[task.setvariable variable=guardRun]$(echo "$GUARD_OUT" | sed -n 's/^run=//p')"
      echo "##vso[task.setvariable variable=guardTask]$(echo "$GUARD_OUT" | sed -n 's/^task=//p')"
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      AGENT_TEMPDIRECTORY: $(Agent.TempDirectory)
      NPX_SPEC: $(npxSpec)
    displayName: Guard - decide whether to run
  - bash: |
      set -euo pipefail
      if [ ! -f docs/orchestration/tracker-sync.json ]; then
        echo "no tracker-sync.json — skipping tracker sync"; exit 0
      fi
      npx --yes "$NPX_SPEC" tracker-sync --target . --apply || true
      if ! git diff --quiet tasks.md; then
        git config user.name "orchestrator-run pipeline"
        git config user.email "orchestrator-run@dev.azure.com"
        git add tasks.md && git commit -m "chore(tasks): tracker sync"
      fi
    condition: and(succeeded(), eq(variables['guardRun'], 'true'))
    env:
      AZURE_DEVOPS_PAT: $(AZURE_DEVOPS_PAT)
      NPX_SPEC: $(npxSpec)
    displayName: Tracker sync (optional)
  - bash: |
      set -euo pipefail
      npm i -g @anthropic-ai/claude-code
      git config user.name "orchestrator-run pipeline"
      git config user.email "orchestrator-run@dev.azure.com"
      git checkout -b "orch/run-$(Build.BuildId)"
      claude -p "You are feature-orchestrator. Read .claude/agents/feature-orchestrator.md and execute its procedures for exactly one task: $(guardTask). You are running headless: commit each unit of work as the procedures require, but do NOT push and do NOT open a PR — the pipeline does that after you finish. Stop after completing the task (its completion logged and the task pruned or updated per tasks-format.md) or returning it to Backlog as blocked." \
        --permission-mode acceptEdits \
        --allowedTools "Read,Edit,Write,Bash,Glob,Grep,Task" \
        --max-turns 80
    condition: and(succeeded(), eq(variables['guardRun'], 'true'))
    env:
      ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
    displayName: Run feature-orchestrator headless
  - bash: |
      set -euo pipefail
      if [ -z "$(git log "origin/$(Build.SourceBranchName)..HEAD" --oneline)" ]; then
        echo "no commits produced — nothing to push"; exit 0
      fi
      git push -u origin "HEAD:orch/run-$(Build.BuildId)"
      node -e '
        const body = {
          sourceRefName: "refs/heads/orch/run-" + process.env.BUILD_BUILDID,
          targetRefName: "refs/heads/" + process.env.BUILD_SOURCEBRANCHNAME,
          title: "orch: " + process.env.GUARD_TASK + " (scheduled run)",
          description: "Headless feature-orchestrator run for " + process.env.GUARD_TASK +
            ".\n\nAudit trail: this pipeline run, git history on this branch, and docs/orchestration/handoff-log.jsonl." +
            "\nReview and merge manually — this pipeline never merges.",
        };
        fetch(process.env.SYSTEM_COLLECTIONURI + process.env.SYSTEM_TEAMPROJECT +
          "/_apis/git/repositories/" + process.env.BUILD_REPOSITORY_ID + "/pullrequests?api-version=7.1", {
          method: "POST",
          headers: {
            Authorization: "Basic " + Buffer.from(":" + process.env.SYSTEM_ACCESSTOKEN).toString("base64"),
            "Content-Type": "application/json",
          },
          body: JSON.stringify(body),
        }).then(async (res) => {
          if (!res.ok) { console.error("PR creation failed: " + res.status + " " + (await res.text())); process.exit(1); }
          const pr = await res.json();
          console.log("opened PR #" + pr.pullRequestId);
        });
      '
    condition: and(succeeded(), eq(variables['guardRun'], 'true'))
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      GUARD_TASK: $(guardTask)
      BUILD_BUILDID: $(Build.BuildId)
      BUILD_SOURCEBRANCHNAME: $(Build.SourceBranchName)
      BUILD_REPOSITORY_ID: $(Build.Repository.ID)
      SYSTEM_COLLECTIONURI: $(System.CollectionUri)
      SYSTEM_TEAMPROJECT: $(System.TeamProject)
    displayName: Push branch and open PR
