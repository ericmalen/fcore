# orchestrator-run — scheduled headless execution of the generated
# feature-orchestrator against tasks.md (DD-15). GitHub Actions variant,
# structurally paired step-for-step with orchestrator-run.ado.yml.
#
# Safety rules (do not weaken):
#   - The guard (headless-guard.mjs) skips when the Backlog is empty, when
#     only blocked/triage tasks remain, or while a previous orch/ PR is open.
#   - The orchestrator runs exactly ONE task per run, commits on a work
#     branch, and never pushes — the pipeline pushes and opens the PR.
#   - Never auto-merge: the PR is reviewed and merged by a person.
#   - Audit trail: git history + docs/orchestration/handoff-log.jsonl +
#     this workflow's logs. No custom server, ever.
#
# Setup:
#   - Requires completed orchestration generation (generation-manifest.json)
#     and a seeded tasks.md.
#   - Secret ANTHROPIC_API_KEY (required).
#   - Repo setting "Allow GitHub Actions to create and approve pull requests"
#     must be enabled (Settings → Actions → General).
#   - Optional: docs/orchestration/tracker-sync.json to chain a tracker sync
#     before the run (GitHub Issues need no extra secret; gh uses the
#     workflow token).
#   - Private Agent Base repo? Use secrets.KIT_TOKEN — see commented line.
name: orchestrator-run
on:
  schedule:
    - cron: '0 5 * * 1-5' # weekdays 05:00 UTC
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: orchestrator-run
  cancel-in-progress: false
jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Clone Agent Base at pin
        run: |
          set -euo pipefail
          MARKER=.claude/agent-base.json
          test -f "$MARKER"
          KIT_URL="$(node -e "process.stdout.write(require('./$MARKER').toolRepo)")"
          PIN="$(node -e "const m=require('./$MARKER'); process.stdout.write(m.pin||('v'+m.standard))")"
          # Private Agent Base repo? prepend credentials, e.g.:
          # KIT_URL="$(echo "$KIT_URL" | sed "s#https://#https://x-token:${{ secrets.KIT_TOKEN }}@#")"
          git clone --depth 1 --branch "$PIN" "$KIT_URL" "${RUNNER_TEMP}/agent-base" || {
            echo "::error title=Agent Base pin clone failed::Could not clone $KIT_URL at tag $PIN; do not fall back to an unpinned clone."
            exit 1
          }
      - name: Guard - decide whether to run
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr list --state open --json headRefName --jq '[.[].headRefName]' > "${RUNNER_TEMP}/open-branches.json"
          AGENT_BASE="${RUNNER_TEMP}/agent-base" node --input-type=module -e '
            import { readFileSync, appendFileSync } from "node:fs";
            const base = process.env.AGENT_BASE;
            const { parseTasksMd } = await import(`${base}/scripts/lib/orchestration/parse-tasks.mjs`);
            const { decideHeadlessRun } = await import(`${base}/scripts/lib/orchestration/headless-guard.mjs`);
            const { doc, errors } = parseTasksMd(readFileSync("tasks.md", "utf8"));
            if (errors.length) { console.error(errors.join("\n")); process.exit(1); }
            const openBranches = JSON.parse(readFileSync(process.env.RUNNER_TEMP + "/open-branches.json", "utf8"));
            const d = decideHeadlessRun({ tasksDoc: doc, openBranches });
            console.log(`guard: run=${d.run} reason=${d.reason} task=${d.taskId ?? "-"}`);
            appendFileSync(process.env.GITHUB_OUTPUT, `run=${d.run}\nreason=${d.reason}\ntask=${d.taskId ?? ""}\n`);
          '
      - name: Tracker sync (optional)
        if: steps.guard.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        run: |
          set -euo pipefail
          if [ ! -f docs/orchestration/tracker-sync.json ]; then
            echo "no tracker-sync.json — skipping tracker sync"; exit 0
          fi
          node "${RUNNER_TEMP}/agent-base/scripts/tracker-sync.mjs" --target . --apply || true
          if ! git diff --quiet tasks.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tasks.md && git commit -m "chore(tasks): tracker sync"
          fi
      - name: Run feature-orchestrator headless
        if: steps.guard.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          npm i -g @anthropic-ai/claude-code
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "orch/run-${{ github.run_id }}"
          claude -p "You are feature-orchestrator. Read .claude/agents/feature-orchestrator.md and execute its procedures for exactly one task: ${{ steps.guard.outputs.task }}. You are running headless: commit each unit of work as the procedures require, but do NOT push and do NOT open a PR — the pipeline does that after you finish. Stop after moving the task to Done or returning it to Backlog as blocked." \
            --permission-mode acceptEdits \
            --allowedTools "Read,Edit,Write,Bash,Glob,Grep,Task" \
            --max-turns 80
      - name: Push branch and open PR
        if: steps.guard.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$(git log origin/${{ github.event.repository.default_branch }}..HEAD --oneline)" ]; then
            echo "no commits produced — nothing to push"; exit 0
          fi
          git push -u origin HEAD
          gh pr create \
            --title "orch: ${{ steps.guard.outputs.task }} (scheduled run)" \
            --body "Headless feature-orchestrator run for ${{ steps.guard.outputs.task }}.

          Audit trail: this workflow run, git history on this branch, and docs/orchestration/handoff-log.jsonl.
          Review and merge manually — this pipeline never merges."
